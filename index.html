<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras para Texia</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #97e6af;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #d35400;
            margin-bottom: 5px;
        }
        .subtitle {
            font-style: italic;
            margin-bottom: 20px;
            color: #7f8c8d;
        }
        #word-search {
            display: grid;
            grid-template-columns: repeat(12, 35px);
            grid-template-rows: repeat(12, 35px);
            gap: 2px;
            background-color: #11990d
            padding: 2px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .cell {
            background-color: #a0f098;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            border-radius: 4px;
            transition: background-color 0.2s, color 0.2s;
        }
        .cell.selected {
            background-color: #ec7bec;
            color: #fff;
        }
        .cell.found-letter {
            background-color: #810d7b;
            color: #fff;
        }
        .word-list-container {
            margin-top: 20px;
            background: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            min-width: 250px;
        }
        ul {
            list-style-type: none;
            padding: 0;
            text-align: center;
        }
        li {
            font-size: 1.1rem;
            margin: 5px 0;
            transition: all 0.3s ease;
        }
        .game-word {
            font-weight: bold;
            color: #2c3e50;
        }
        .found-word {
            text-decoration: line-through;
            color: #c1c7bd;
            opacity: 0.6;
        }
        .refresh-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            color: #fff;
            background-color: #d35400;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .refresh-btn:hover {
            background-color: #e67e22;
        }
        #loading {
            font-size: 1.2rem;
            color: #d35400;
            font-weight: bold;
            margin: 20px 0;
        }
        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .modal-content h2 {
            color: #e74c3c;
            margin-top: 0;
            font-size: 2rem;
        }
        .modal-content p {
            font-size: 1.2rem;
            color: #555;
            line-height: 1.5;
        }
        .close-modal-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            color: #fff;
            background-color: #27ae60;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* --- ADAPTACIÓN PARA CELULARES (DISEÑO RESPONSIVO) --- */
        @media (max-width: 500px) {
            h1 {
                font-size: 1.8rem;
            }
            #word-search {
                /* Achicamos las celdas de 35px a 26px para que quepan en la pantalla */
                grid-template-columns: repeat(12, 26px);
                grid-template-rows: repeat(12, 26px);
                gap: 1px; /* Menos espacio entre los cuadritos */
            }
            .cell {
                font-size: 1rem; /* Letra un poquito más pequeña */
            }
            .word-list-container {
                min-width: 90%;
                padding: 10px;
            }
            li {
                font-size: 0.95rem; /* Achicamos el texto de los significados */
            }
            .modal-content {
                padding: 25px;
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <h1>Sopa de Letras 🤭</h1>
    <p class="subtitle">Encuentra las palabras escondidas</p>

    <div id="loading">Cargando palabras poéticas...</div>

    <div id="game-container" style="display: none; flex-direction: column; align-items: center;">
        <div id="word-search"></div>

        <div class="word-list-container">
            <h3>Palabras a encontrar:</h3>
            <ul id="word-list"></ul>
        </div>

        <button class="refresh-btn" onclick="location.reload()">¡Jugar de nuevo!</button>
    </div>

    <div id="win-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>¡Lo lograste! ❤️</h2>
            <p>Encontraste todas las palabras.<br><br>¡Te qxiero mxchísimo, mi flor de la araxcania!</p>
            <button class="close-modal-btn" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script>
        const gridSize = 12;
        let words = [];
        let grid = [];
        let cellElements = [];

        function buildWords(rawWords) {
            const list = Array.isArray(rawWords) ? rawWords : [];
            const unique = new Set();

            const processed = list
                // Filtramos para asegurarnos de que el JSON nos entregue objetos con "palabra" y "significado"
                .filter(item => item && typeof item.palabra === 'string')
                .map(item => ({
                    palabraRaw: item.palabra.trim(),
                    significado: item.significado || 'Palabra poética'
                }))
                .filter(item => item.palabraRaw)
                .map(item => ({
                    ...item,
                    // Limpiamos la palabra para la sopa de letras (quitamos tildes y mayúsculas)
                    cleanWord: item.palabraRaw.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase().replace(/[^A-ZÑ]/g, '')
                }))
                .filter(item => item.cleanWord.length >= 3)
                .map(item => ({
                    ...item,
                    cleanWord: item.cleanWord.length > 10 ? item.cleanWord.substring(0, 10) : item.cleanWord
                }))
                .filter(item => {
                    if (unique.has(item.cleanWord)) return false;
                    unique.add(item.cleanWord);
                    return true;
                })
                .slice(0, 5) // Toma 5 palabras aleatorias
                // Aquí enlazamos la palabra limpia con su significado exacto para la pantalla
                .map(item => ({ word: item.cleanWord, meaning: item.significado, cells: [], found: false }));

            // Siempre agregamos a Texia al final, garantizado.
            if (!unique.has('TEXIA')) {
                processed.push({ word: 'TEXIA', meaning: 'Mi señora hermosa', cells: [], found: false });
            }

            return processed;
        }

        async function initGame() {
            try {
                // Hacemos el fetch a tu propio archivo JSON (con un parámetro para evitar el caché guardado)
                const response = await fetch('palabras.json?v=' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error("No se pudo cargar tu archivo palabras.json");
                }
                
                const data = await response.json();
                const miDiccionario = data.diccionario;

                // Mezclamos el diccionario para que salgan palabras distintas cada vez
                const shuffled = miDiccionario.sort(() => 0.5 - Math.random());
                words = buildWords(shuffled);

                if (!words.length) {
                    throw new Error("El archivo JSON está vacío o mal estructurado");
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
                buildGrid();

            } catch (error) {
                console.error("Error consultando la API local:", error);
                document.getElementById('loading').textContent = "Hubo un error cargando las palabras. Asegúrate de que palabras.json esté en GitHub.";
            }
        }

        function buildGrid() {
            grid = Array.from({ length: gridSize }, () => Array(gridSize).fill(''));
            cellElements = Array.from({ length: gridSize }, () => Array(gridSize).fill(null));

            const placedWords = [];
            words.forEach(wordObj => {
                wordObj.cells = [];
                wordObj.found = false;
                if (placeWord(wordObj)) {
                    placedWords.push(wordObj);
                }
            });
            words = placedWords;

            const letters = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ";
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (grid[r][c] === '') {
                        grid[r][c] = letters.charAt(Math.floor(Math.random() * letters.length));
                    }
                }
            }

            renderGrid();
            renderWordList();
        }

        function placeWord(wordObj) {
            let placed = false;
            const word = wordObj.word;
            let attempts = 0;
            
            while (!placed && attempts < 200) {
                const isHorizontal = Math.random() > 0.5;
                const row = Math.floor(Math.random() * gridSize);
                const col = Math.floor(Math.random() * gridSize);

                if (isHorizontal && col + word.length <= gridSize) {
                    let canPlace = true;
                    for (let i = 0; i < word.length; i++) {
                        if (grid[row][col + i] !== '' && grid[row][col + i] !== word[i]) { canPlace = false; break; }
                    }
                    if (canPlace) {
                        for (let i = 0; i < word.length; i++) {
                            grid[row][col + i] = word[i];
                            wordObj.cells.push({r: row, c: col + i});
                        }
                        placed = true;
                    }
                } else if (!isHorizontal && row + word.length <= gridSize) {
                    let canPlace = true;
                    for (let i = 0; i < word.length; i++) {
                        if (grid[row + i][col] !== '' && grid[row + i][col] !== word[i]) { canPlace = false; break; }
                    }
                    if (canPlace) {
                        for (let i = 0; i < word.length; i++) {
                            grid[row + i][col] = word[i];
                            wordObj.cells.push({r: row + i, c: col});
                        }
                        placed = true;
                    }
                }
                attempts++;
            }
            return placed;
        }

        function renderGrid() {
            const gridElement = document.getElementById('word-search');
            gridElement.innerHTML = ''; 

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.textContent = grid[r][c];
                    
                    cell.addEventListener('click', () => {
                        if(!cell.classList.contains('found-letter')) {
                            cell.classList.toggle('selected');
                            checkWords();
                        }
                    });
                    
                    cellElements[r][c] = cell;
                    gridElement.appendChild(cell);
                }
            }
        }

        function renderWordList() {
            const wordListElement = document.getElementById('word-list');
            wordListElement.innerHTML = '';

            words.forEach((w, index) => {
                const li = document.createElement('li');
                li.id = `word-li-${index}`;
                
                // Ahora le decimos que imprima TODAS las palabras con su significado, 
                // y le damos un toque visual más sutil al texto de la definición
                li.innerHTML = `<span class="game-word">${w.word}</span>: <span style="font-size: 0.9em; color: #555; font-style: italic;">${w.meaning}</span>`;
                
                wordListElement.appendChild(li);
            });
        }

        function checkWords() {
            let allFound = true;

            words.forEach((w, index) => {
                if (w.found) return;

                const allSelected = w.cells.every(pos => {
                    return cellElements[pos.r][pos.c].classList.contains('selected') || 
                           cellElements[pos.r][pos.c].classList.contains('found-letter');
                });

                if (allSelected) {
                    w.found = true;
                    document.getElementById(`word-li-${index}`).classList.add('found-word');
                    
                    w.cells.forEach(pos => {
                        cellElements[pos.r][pos.c].classList.remove('selected');
                        cellElements[pos.r][pos.c].classList.add('found-letter');
                    });
                } else {
                    allFound = false;
                }
            });

            if (allFound) {
                setTimeout(() => { document.getElementById('win-modal').style.display = 'flex'; }, 400);
            }
        }

        function closeModal() {
            document.getElementById('win-modal').style.display = 'none';
        }

        initGame();
    </script>
</body>
</html>
